<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; font-family: monospace; padding: 24px; color: #9ca3af; height: 100vh; }
    h2 { color: #60a5fa; font-size: 14px; margin-bottom: 16px; font-weight: normal; }
    #log { font-size: 11px; line-height: 1.8; overflow-y: auto; max-height: calc(100vh - 60px); }
    .err { color: #f87171; }
    .ok  { color: #4ade80; }
  </style>
</head>
<body>
  <h2>NotePlan Clone 시작 중...</h2>
  <div id="log"></div>
  <script>
    window.addLog = function(msg, type) {
      var el = document.getElementById('log');
      var line = document.createElement('div');
      if (type === 'error') line.className = 'err';
      if (type === 'ok')    line.className = 'ok';
      line.textContent = msg;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    }
  </script>
</body>
</html>
